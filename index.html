<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duduz1n | PvP e Dev</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            padding: 50px 20px;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        /* Foto de Perfil com efeito de aumentar */
        .perfil-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #8e44ad;
            box-shadow: 0 0 20px #8e44ad;
            transition: transform 0.3s ease;
        }

        .perfil-img:hover {
            transform: scale(1.1);
        }

        /* Nome Duduz1n com efeito */
        h1 {
            color: #8e44ad;
            margin-top: 20px;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        h1:hover {
            transform: scale(1.05);
        }

        .bio {
            max-width: 500px;
            margin: 20px auto;
            line-height: 1.6;
            font-size: 1.1em;
        }

        nav {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* Botões Início, Texturas e TikTok com efeito de subir e ficar roxo */
        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #8e44ad;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
        }

        nav a:hover {
            background-color: #8e44ad;
            transform: translateY(-5px); /* Efeito de subir que você pediu */
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="foto-perfil.jpg" alt="Duduz1n" class="perfil-img">
        <h1>Duduz1n</h1>
        <p class="bio">
            Um cara muito fã de PvP 1.8.9, criar conteúdo no TikTok, e ser um pequeno desenvolvedor de Python e HTML (CSS e um pouco de JS também). Seja bem-vindo ao meu canto na web!
        </p>
        <nav>
            <a href="index.html">Início</a>
            <a href="texturas.html">Texturas</a>
            <a href="https://www.tiktok.com/@duduz1n.bw" target="_blank">Meu TikTok</a>
        </nav>
    </div>
</body>
</html>
