<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Erro 67</title>
    <style>
        body { 
            background: black; 
            color: red; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            cursor: pointer;
        }
        h1 { font-size: 80px; text-shadow: 0 0 20px red; }
        p { color: white; font-size: 18px; }
    </style>
</head>
<body onclick="tocar()">

    <h1 id="status">erro 67</h1>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function tocar() {
            var audio = document.getElementById("musica");
            audio.play();
            document.getElementById("msg").style.display = "none";
            document.getElementById("status").innerText = "erro 67";
        }
    </script>

</body>
</html>
